<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Parfume Gen Z</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">
            <div class="icon">
                <i class="fas fa-spray-can-sparkles"></i>
            </div>
            <div>
                <h1>Toko Parfume <span>Gen Z</span></h1>
                <p></p>
            </div>
        </div>

        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="nama" placeholder="Nama pelanggan">
        </div>

        <div class="input-group">
            <i class="fas fa-box"></i>
            <input type="text" id="produk" placeholder="Nama produk">
        </div>

        <div class="input-group">
            <i class="fas fa-tag"></i>
            <input type="number" id="harga" placeholder="Harga produk">
        </div>

        <div class="input-group">
            <i class="fas fa-cart-shopping"></i>
            <input type="number" id="jumlah" placeholder="Jumlah beli">
        </div>

        <div class="buttons">
            <button class="btn-hitung" onclick="hitung()">
                <i class="fas fa-calculator"></i> Hitung
            </button>

            <button class="btn-reset" onclick="resetForm()">
                <i class="fas fa-rotate"></i> Reset
            </button>
        </div>

        <div id="bonus"></div>

        <div class="hasil" id="hasil">

            <h2>Detail Pembayaran</h2>

            <div class="row"><span>Pelanggan</span><strong id="hNama"></strong></div>
            <div class="row"><span>Produk</span><strong id="hProduk"></strong></div>
            <div class="row"><span>Total Belanja</span><strong id="hBelanja"></strong></div>
            <div class="row"><span>Diskon</span><strong id="hDiskon"></strong></div>

            <div class="row total">
                <span>Total Bayar</span>
                <strong id="hBayar"></strong>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
